spring:
  datasource:
    url: jdbc:h2:mem:vulnerabilities_mvp;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: true

app:
  security:
    jwt:
      secret: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
      issuer: vulnerabilities-mvp-test
      expiration-minutes: 15
    max-request-size-bytes: 16384
    max-file-size-bytes: 16384
    max-json-string-length: 4096
    max-json-nesting-depth: 40
    max-json-number-length: 64
    max-failed-login-attempts: 5
    login-lockout-minutes: 15
  payments:
    default-page-size: 20
    max-page-size: 100
  fraud:
    large-amount-threshold: 5000.00
    frequency-window-minutes: 10
    frequency-threshold: 3
  exports:
    base-directory: ${java.io.tmpdir}/vulnerabilities-mvp-exports-test
    max-rows: 100
