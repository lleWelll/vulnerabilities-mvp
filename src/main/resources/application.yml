spring:
  application:
    name: vulnerabilities-mvp
  config:
    import: optional:file:./secret.env[.properties]
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vulnerabilities_mvp}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  servlet:
    multipart:
      enabled: false
      max-file-size: 16KB
      max-request-size: 16KB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
    max-request-size-bytes: ${APP_MAX_REQUEST_SIZE_BYTES:16384}
    max-file-size-bytes: ${APP_MAX_FILE_SIZE_BYTES:16384}
    max-json-string-length: ${APP_MAX_JSON_STRING_LENGTH:4096}
    max-json-nesting-depth: ${APP_MAX_JSON_NESTING_DEPTH:40}
    max-json-number-length: ${APP_MAX_JSON_NUMBER_LENGTH:64}
  payments:
    default-page-size: ${APP_DEFAULT_PAGE_SIZE:20}
    max-page-size: ${APP_MAX_PAGE_SIZE:100}
  fraud:
    large-amount-threshold: ${APP_FRAUD_LARGE_AMOUNT_THRESHOLD:5000.00}
    frequency-window-minutes: ${APP_FRAUD_FREQUENCY_WINDOW_MINUTES:10}
    frequency-threshold: ${APP_FRAUD_FREQUENCY_THRESHOLD:3}
